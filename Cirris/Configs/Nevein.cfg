        {
            displayName = Nevein
            description = Nevein is the largest moon of Selene, and also arguably the most confusing. Its formation stumps even the top Kerbal scientists; proof of how it happened is seemingly non-existent, and its plausibility is even lower. The leading theory is that Selene once had multiple moons that collided to form Nevein, which would explain its slightly eccentric and inclined orbit. Perhaps a visit will finally crack the code.
